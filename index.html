body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;background:#f0f2f5;color:#1c1e21;padding-bottom:80px}

.card{background:#fff;margin:8px;border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card.done{opacity:.65}
.head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}

.acts{display:flex;gap:8px;margin-bottom:10px}
.btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:600;border:none;cursor:pointer}
.btn:active{transform:scale(.97)}
.call{background:#0563C1;color:#fff}
.wa{background:#25D366;color:#fff}
.ico{font-size:18px}

.sel.s1{background-color:#00B050;color:#fff;border-color:#00B050}
.sel.s2{background-color:#C6EFCE;color:#006100}

.sel.s4{background-color:#FFEB9C;color:#9C5700}
.sel.s5{background-color:#FFC7CE;color:#9C0006}
.sel.s6{background-color:#F2F2F2;color:#595959}
.nt{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;margin-top:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:36px}
.empty{padding:40px 20px;text-align:center;color:#888}
.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px;border-top:1px solid #ddd;display:flex;gap:8px;z-index:100}
.bar button{flex:1;padding:10px;border:1px solid #ccc;background:#fff;border-radius:6px;font-size:13px;cursor:pointer}
.bar button.pri{background:#1F4E78;color:#fff;border-color:#1F4E78}
